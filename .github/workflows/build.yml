name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: "OpenWrt 版本"
        required: true
        default: "23.05"
        type: choice
        options:
          - "23.05"
          - "24.10"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Checkout OpenWrt"
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-${{ inputs.openwrt_version }}
          path: openwrt

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3 python3-dev python3-setuptools \
            rsync unzip zlib1g-dev file wget curl \
            gzip tar zip xz-utils bzip2 zstd \
            make cmake autoconf automake libtool patch diffutils \
            findutils grep sed help2man texinfo \
            libelf-dev libfuse-dev liblzma-dev libxml2-dev libyaml-dev \
            uuid-dev device-tree-compiler antlr3 gperf \
            time bc jq xxd swig upx-ucl ccache ecj fastjar imagemagick

      - name: Setup configuration
        run: |
          # 复制配置文件到 OpenWrt 目录
          cp config/myconfig openwrt/.config

          # 创建构建目录
          mkdir -p openwrt/dl

          echo "📋 使用 myconfig → .config"
          echo "🔄 生成默认配置 (make defconfig)"
          cd openwrt
          make defconfig

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          echo "📦 更新 feeds"
          ./scripts/feeds update -a

          echo "📦 安装 feeds"
          ./scripts/feeds install -a

      - name: Download source packages
        working-directory: openwrt
        run: |
          JOBS=$(nproc)
          echo "⬇️ 下载所有源码包（并行任务数：${JOBS}）"
          if ! make download -j${JOBS} 2>&1 | tee download.log; then
            echo "❌ 下载失败，错误日志如下："
            echo "----- 👇 下载日志输出开始 👇 -----"
            tail -n 50 download.log | sed 's/^/    /'
            echo "----- ☝ 下载日志输出结束 ☝ -----"
            exit 1
          fi
          echo "✅ 源码包下载完成"

      - name: Download and install toolchain
        working-directory: openwrt
        run: |
          JOBS=$(nproc)

          # 根据版本设置工具链下载地址和压缩格式
          if [[ "${{ inputs.openwrt_version }}" == "23.05" ]]; then
            TOOLCHAIN_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-toolchain-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
            FMT="tar.xz"
          elif [[ "${{ inputs.openwrt_version }}" == "24.10" ]]; then
            TOOLCHAIN_URL="https://downloads.openwrt.org/releases/24.10.2/targets/x86/64/openwrt-toolchain-24.10.2-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
            FMT="tar.zst"
          else
            echo "❌ 不支持的 OpenWrt 版本：${{ inputs.openwrt_version }}"
            exit 1
          fi

          FILE_NAME=$(basename "${TOOLCHAIN_URL}")
          TOOLCHAIN_PATH="dl/${FILE_NAME}"

          echo "⬇️ 下载工具链：${FILE_NAME}"
          wget -O "${TOOLCHAIN_PATH}" "${TOOLCHAIN_URL}"

          echo "📦 使用工具链包：${FILE_NAME}"
          echo "🔧 解包并安装工具链（格式：${FMT}）…"
          make toolchain/install V=s TOOLCHAIN_ARCHIVE_FORMAT="${FMT}" -j"${JOBS}"

      - name: Build OpenWrt
        working-directory: openwrt
        run: |
          JOBS=$(nproc)
          echo "🚀 开始全量编译（并行任务数：${JOBS}）"
          BUILD_START=$(date "+%Y-%m-%d %H:%M:%S")
          echo "⏱️ 编译开始时间：${BUILD_START}"

          if ! time make world -j${JOBS} 2>&1 | tee build.log; then
            echo "❌ 全量编译失败，错误日志如下："
            echo "----- 👇 编译日志输出开始 👇 -----"
            tail -n 100 build.log | sed 's/^/    /'
            echo "----- ☝ 编译日志输出结束 ☝ -----"
            exit 1
          fi

          BUILD_END=$(date "+%Y-%m-%d %H:%M:%S")
          echo "✅ 全量编译成功"
          echo "⏱️ 编译开始时间：${BUILD_START}"
          echo "⏱️ 编译结束时间：${BUILD_END}"
          echo
          echo "📂 输出示例 (bin/targets):"
          find bin/targets -type f \( -name '*.img*' -o -name '*.bin' \) | head -10

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bin-${{ inputs.openwrt_version }}-${{ inputs.arch }}
          path: openwrt/bin/targets/
