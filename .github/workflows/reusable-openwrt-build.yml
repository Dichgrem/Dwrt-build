name: Reusable OpenWrt Builder

on:
  workflow_call:
    inputs:
      source_repo:
        required: true
        type: string
        description: "源仓库选项：x-wrt / openwrt / lienol / lede / immortalwrt"
      openwrt_branch:
        required: true
        type: string
        description: "源码分支或 tag"
      config_path:
        required: true
        type: string
        description: "Config 文件路径（相对调用者仓库根目录）"
      targets:
        required: false
        type: string
        default: ""
        description: "编译目标平台列表（逗号分隔）"
      profiles:
        required: false
        type: string
        default: ""
        description: "设备 Profile 列表（逗号分隔）"
      parallel_jobs:
        required: false
        type: string
        default: "4"
        description: "make -jN 并行线程数"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repo_url: ${{ steps.set-repo.outputs.repo_url }}
      repo_short: ${{ steps.set-repo.outputs.repo_short }}
      matrix: ${{ steps.gen-matrix.outputs.matrix }}

    steps:
      - name: 设置实际仓库 URL
        id: set-repo
        run: |
          case "${{ inputs.source_repo }}" in
            x-wrt)       URL="https://github.com/x-wrt/x-wrt.git";       SHORT="x-wrt/x-wrt" ;;
            openwrt)     URL="https://git.openwrt.org/openwrt/openwrt.git"; SHORT="openwrt/openwrt" ;;
            lienol)      URL="https://github.com/Lienol/openwrt.git";    SHORT="Lienol/openwrt" ;;
            lede)        URL="https://github.com/coolsnowwolf/lede.git"; SHORT="coolsnowwolf/lede" ;;
            immortalwrt) URL="https://github.com/immortalwrt/immortalwrt.git"; SHORT="immortalwrt/immortalwrt" ;;
            *) echo "未知仓库: ${{ inputs.source_repo }}" >&2; exit 1 ;;
          esac
          echo "repo_url=${URL}" >> $GITHUB_OUTPUT
          echo "repo_short=${SHORT}" >> $GITHUB_OUTPUT

      - name: 生成编译矩阵
        id: gen-matrix
        run: |
          python3 - <<'EOF'
          import os, json
          ts = [t.strip() for t in os.getenv('TARGETS','').split(',') if t.strip()]
          ps = [p.strip() for p in os.getenv('PROFILES','').split(',') if p.strip()]
          matrix = {'include': []}
          if not ts: ts = ['']
          if not ps: ps = ['']
          for t in ts:
            for p in ps:
              matrix['include'].append({'TARGET': t, 'PROFILE': p})
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write("matrix=" + json.dumps(matrix) + "\n")
          EOF
        env:
          TARGETS: ${{ inputs.targets }}
          PROFILES: ${{ inputs.profiles }}

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout OpenWrt 源码
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repo_short }}
          ref: ${{ inputs.openwrt_branch }}

      - name: Checkout 调用者仓库（用于 diy.sh 等自定义脚本）
        uses: actions/checkout@v4
        with:
          path: caller

      - name: 执行 diy 修改
        run: |
          cp caller/diy.sh .
          chmod +x diy.sh
          ./diy.sh

      - name: 安装主机依赖（apt）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            aria2 autoconf automake autopoint \
            bash bison build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex g++ gawk gcc g++-multilib gcc-multilib gettext git gperf \
            help2man intltool jq libelf-dev libev-dev libfuse-dev libgmp3-dev libltdl-dev liblzma-dev \
            libmpc-dev libmpfr-dev libncurses5-dev libncurses-dev libpam-dev libpython3-dev \
            libreadline-dev libsnmp-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz make \
            ninja-build p7zip-full patch pkgconf python3 python3-dev python3-pip python3-ply \
            python3-docutils python3-setuptools python3-pyelftools qemu-utils re2c rename rsync scons \
            squashfs-tools subversion swig texinfo unzip upx-ucl vim wget which xmlto xxd zlib1g-dev zstd

      - name: 添加 feeds 源（去重）
        run: |
          # 删除重复行（如已有 packages 或 luci）
          sed -i '/src-git packages/d' feeds.conf.default
          sed -i '/src-git luci/d' feeds.conf.default
          # 追加你自己的 feeds
          echo 'src-git packages https://github.com/openwrt/packages.git' >> feeds.conf.default
          echo 'src-git luci https://github.com/openwrt/luci.git' >> feeds.conf.default

      - name: 自动适配 feeds 源（适配 OpenWrt / ImmortalWrt）
        run: |
          # 判断当前 WRT 类型（根据 banner 或目录结构）
          if grep -q 'ImmortalWrt' include/version.mk 2>/dev/null; then
            echo "Detected: ImmortalWrt"
            # 清理重复行
            sed -i '/src-git packages/d' feeds.conf.default
            sed -i '/src-git luci/d' feeds.conf.default
            # 保留默认 ImmortalWrt feeds，不添加 openwrt 官方源
            echo "Using ImmortalWrt default feeds"
          elif grep -q 'OpenWrt' include/version.mk 2>/dev/null; then
            echo "Detected: OpenWrt"
            # 清理重复行
            sed -i '/src-git packages/d' feeds.conf.default
            sed -i '/src-git luci/d' feeds.conf.default
            # 添加 OpenWrt 官方 feeds
            echo 'src-git packages https://github.com/openwrt/packages.git' >> feeds.conf.default
            echo 'src-git luci https://github.com/openwrt/luci.git' >> feeds.conf.default
          else
            echo "⚠️ 未识别的WRT类型，默认使用当前 feeds.conf.default"
          fi

      - name: 更新并安装 feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Checkout 调用者仓库（用于读取 .config）
        uses: actions/checkout@v4
        with:
          path: caller

      - name: 应用用户 .config
        run: |
          cp caller/${{ inputs.config_path }} .config
          make defconfig

      - name: 下载所有依赖包
        run: |
          make download -j$(nproc) || make download -j1 V=s

      - name: 编译工具链
        run: |
          make toolchain/install -j$(nproc)

      - name: 编译固件
        run: |
          MAKE_ARGS="TARGET=${{ matrix.TARGET }} PROFILE=${{ matrix.PROFILE }} -j${{ inputs.parallel_jobs }}"
          make ${MAKE_ARGS}

      - name: 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.TARGET || 'all' }}-${{ matrix.PROFILE || 'all' }}
          path: |
            bin/targets/${{ matrix.TARGET }}/*/*.bin
            bin/targets/${{ matrix.TARGET }}/*/*.img
            bin/targets/${{ matrix.TARGET }}/*/*.tar
